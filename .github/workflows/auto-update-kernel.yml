name: Auto-Update Kernel Versions

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  update-kernel:
    runs-on: ubuntu-latest
    container: fedora:43
    permissions:
      contents: write
    steps:
      - name: Install dependencies
        run: |
          dnf install -y git jq curl
          git config --global --add safe.directory '*'

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Latest Kernel Versions
        id: fetch_versions
        run: |
          echo "Fetching versions from CachyOS sources..."
          
          # Stable: Query the official CachyOS Fedora Copr for the main kernel on fedora-43-x86_64
          # Returns something like "6.18.12-cachyos1"
          COPR_VER=$(curl -s "https://copr.fedorainfracloud.org/api_3/build/list/?ownername=bieszczaders&projectname=kernel-cachyos" | jq -r '[.items[] | select(.state == "succeeded" and (.chroots | index("fedora-43-x86_64")) and .source_package.name == "kernel-cachyos" and .source_package.version != null)] | sort_by(.source_package.version | split("-")[0] | split(".") | map(tonumber)) | reverse | .[0].source_package.version')
          
          if [ -z "$COPR_VER" ]; then
            echo "Error: Could not fetch a valid version from Copr API."
            exit 1
          fi

          STABLE_FULL=$(echo $COPR_VER | cut -d- -f1)
          BASE_STABLE=$(echo $STABLE_FULL | cut -d. -f1,2)
          MINOR_STABLE=$(echo $STABLE_FULL | cut -d. -f3)
          if [ -z "$MINOR_STABLE" ]; then MINOR_STABLE=0; fi
          
          echo "CachyOS Stable (Copr F43): $STABLE_FULL (Base: $BASE_STABLE, Minor: $MINOR_STABLE)"

          # Update the .spec file
          echo "Updating Stable spec file..."
          sed -i "s/^%define _basekver .*/%define _basekver ${BASE_STABLE}/" sources/kernel-cachyos-custom-stable/kernel-cachyos-custom-stable.spec
          sed -i "s/^%define _stablekver .*/%define _stablekver ${MINOR_STABLE}/" sources/kernel-cachyos-custom-stable/kernel-cachyos-custom-stable.spec

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add sources/**/*.spec
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update kernel version to match official F43 Copr release"
            git push
            echo "Successfully updated and pushed new version."
          else
            echo "No new kernel versions found. Everything is up to date."
          fi

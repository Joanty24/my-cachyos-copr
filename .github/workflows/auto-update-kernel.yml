name: Auto-Update Kernel Versions

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  update-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Latest Kernel Versions
        id: fetch_versions
        run: |
          echo "Fetching versions from CachyOS sources..."
          
          # Stable: Query the official CachyOS Fedora Copr
          # Returns something like "6.18.12-cachyos1"
          COPR_VER=$(curl -s "https://copr.fedorainfracloud.org/api_3/build/list/?ownername=bieszczaders&projectname=kernel-cachyos" | jq -r '.items | .[] | select(.state == "succeeded") | .source_package.version' | head -n 1)
          STABLE_FULL=$(echo $COPR_VER | cut -d- -f1)
          BASE_STABLE=$(echo $STABLE_FULL | cut -d. -f1,2)
          MINOR_STABLE=$(echo $STABLE_FULL | cut -d. -f3)
          if [ -z "$MINOR_STABLE" ]; then MINOR_STABLE=0; fi
          
          echo "CachyOS Stable (Copr): $STABLE_FULL (Base: $BASE_STABLE, Minor: $MINOR_STABLE)"

          # Edge: Query the main CachyOS GitHub (Arch Linux version)
          # We'll pull from their PKGBUILD directly
          PKGBUILD=$(curl -s https://raw.githubusercontent.com/CachyOS/linux-cachyos/master/linux-cachyos/PKGBUILD)
          EDGE_MAJOR=$(echo "$PKGBUILD" | grep "_major=" | cut -d= -f2)
          EDGE_MINOR=$(echo "$PKGBUILD" | grep "_minor=" | cut -d= -f2)
          
          echo "CachyOS Edge (GitHub): ${EDGE_MAJOR}.${EDGE_MINOR}"

          # Update the .spec files
          echo "Updating Stable spec file..."
          sed -i "s/^%define _basekver .*/%define _basekver ${BASE_STABLE}/" sources/kernel-cachyos-custom-stable/kernel-cachyos-custom-stable.spec
          sed -i "s/^%define _stablekver .*/%define _stablekver ${MINOR_STABLE}/" sources/kernel-cachyos-custom-stable/kernel-cachyos-custom-stable.spec
          
          echo "Updating Edge spec file..."
          sed -i "s/^%define _basekver .*/%define _basekver ${EDGE_MAJOR}/" sources/kernel-cachyos-custom-edge/kernel-cachyos-custom-edge.spec
          sed -i "s/^%define _stablekver .*/%define _stablekver ${EDGE_MINOR}/" sources/kernel-cachyos-custom-edge/kernel-cachyos-custom-edge.spec

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add sources/**/*.spec
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update kernel versions to match kernel.org"
            git push
            echo "Successfully updated and pushed new versions."
          else
            echo "No new kernel versions found. Everything is up to date."
          fi
